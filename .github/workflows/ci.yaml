name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # disable incremental compilation in CI
  RUST_BACKTRACE: 1

jobs:
  # ── Formatting ────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Linting ───────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy (deny warnings)
        run: cargo clippy --workspace --features injectable/axum -- -D warnings

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --features injectable/axum

      - name: Run tests
        run: cargo test --workspace --features injectable/axum

  # ── MSRV (Minimum Supported Rust Version) ────────────────────────────────
  msrv:
    name: MSRV (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@1.86

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --workspace --features injectable/axum

  # ── Documentation ─────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build docs (deny broken intra-doc links)
        env:
          RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links -D warnings"
        run: cargo doc --workspace --features injectable/axum --no-deps

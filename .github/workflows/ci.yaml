name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # disable incremental compilation in CI
  RUST_BACKTRACE: 1

jobs:
  # ── Formatting ────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Linting ───────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy (deny warnings)
        run: cargo clippy --workspace --features injectable/axum -- -D warnings

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build (injectable/axum)
        run: cargo build --workspace --features injectable/axum

      - name: Build (all features)
        run: cargo build --workspace --all-features

      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

      - name: Test (injectable/axum)
        run: cargo test --workspace --features injectable/axum

      - name: Test (all features)
        run: cargo test --workspace --all-features

      - name: Test (no default features)
        run: cargo test --workspace --no-default-features

  # ── MSRV (Minimum Supported Rust Version) ────────────────────────────────
  msrv:
    name: MSRV (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --workspace --features injectable/axum

  # ── Documentation ─────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build docs (deny broken intra-doc links)
        env:
          RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links -D warnings"
        run: cargo doc --workspace --features injectable/axum --no-deps

  # ── Coverage ──────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage report
        run: |
          cargo tarpaulin \
            --workspace \
            --features injectable/axum \
            --out Xml \
            --timeout 300

      - name: Upload to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          fail_ci_if_error: true
          verbose: true



name: Security

on:
  schedule:
    - cron: "0 8 * * 1"          # every Monday at 08:00 UTC
  push:
    paths:
      - Cargo.lock
      - Cargo.toml
      - "**/Cargo.toml"
  workflow_dispatch:

jobs:
  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit
